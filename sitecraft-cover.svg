<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420">
  <defs>
    <style>
      .ink { fill: #0b0f17; }
      .paper { fill: #e8edf5; }
      .accent { fill: #5b8cff; }
      .muted { fill: rgba(232,237,245,0.55); }
      .dim { fill: rgba(232,237,245,0.35); }
      .rule { stroke: rgba(255,255,255,0.10); stroke-width: 1; }
      .num-box { stroke: rgba(91,140,255,0.30); stroke-width: 1; fill: rgba(91,140,255,0.08); }
      .sans { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; }
      .sans-light { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; }
      .mono { font-family: 'IBM Plex Mono', 'Menlo', monospace; }
    </style>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="420" class="ink"/>
  <rect width="1000" height="420" fill="url(#glow)"/>

  <!-- top rule -->
  <line x1="0" y1="56" x2="1000" y2="56" class="rule"/>
  <text x="48" y="36" class="mono paper" font-size="13" letter-spacing="2">SITECRAFT</text>
  <text x="952" y="36" class="mono accent" font-size="11" letter-spacing="1.5" text-anchor="end">FREE &#183; MULTI-MODEL &#183; OPEN SOURCE</text>

  <!-- left: headline -->
  <g>
    <line x1="48" y1="120" x2="76" y2="120" stroke="#5b8cff" stroke-width="1"/>
    <text x="86" y="124" class="mono accent" font-size="11" letter-spacing="2">AI WEBSITE BUILDER</text>

    <text x="48" y="200" class="sans paper" font-size="58" letter-spacing="-1.5">Free models.</text>
    <text x="48" y="262" class="sans accent" font-size="58" letter-spacing="-1.5">Real websites.</text>

    <text x="48" y="320" class="mono muted" font-size="13">Plain language &#8594; mobile-responsive site.</text>
    <text x="48" y="342" class="mono muted" font-size="13">Iterate via chat. Export HTML. Free forever.</text>
  </g>

  <!-- vertical divider -->
  <line x1="560" y1="80" x2="560" y2="380" class="rule"/>

  <!-- right: endpoints -->
  <g transform="translate(600, 110)">
    <text x="0" y="0" class="mono dim" font-size="10" letter-spacing="2">POWERED BY</text>

    <!-- 01 -->
    <rect x="0" y="22" width="32" height="32" class="num-box"/>
    <text x="16" y="43" class="mono accent" font-size="11" text-anchor="middle">01</text>
    <text x="48" y="36" class="mono paper" font-size="13" font-weight="500">Cerebras</text>
    <text x="48" y="52" class="mono muted" font-size="11">Qwen 3 235B</text>

    <!-- 02 -->
    <rect x="0" y="74" width="32" height="32" class="num-box"/>
    <text x="16" y="95" class="mono accent" font-size="11" text-anchor="middle">02</text>
    <text x="48" y="88" class="mono paper" font-size="13" font-weight="500">Groq</text>
    <text x="48" y="104" class="mono muted" font-size="11">Llama 4 Scout</text>

    <!-- 03 -->
    <rect x="0" y="126" width="32" height="32" class="num-box"/>
    <text x="16" y="147" class="mono accent" font-size="11" text-anchor="middle">03</text>
    <text x="48" y="140" class="mono paper" font-size="13" font-weight="500">OpenRouter</text>
    <text x="48" y="156" class="mono muted" font-size="11">Ling-2.6 Flash</text>

    <!-- 04 -->
    <rect x="0" y="178" width="32" height="32" class="num-box"/>
    <text x="16" y="199" class="mono accent" font-size="11" text-anchor="middle">04</text>
    <text x="48" y="192" class="mono paper" font-size="13" font-weight="500">Cloudflare</text>
    <text x="48" y="208" class="mono muted" font-size="11">GPT-OSS 120B</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420">
  <defs>
    <style>
      .ink { fill: #0d0d0b; }
      .paper { fill: #f2f0eb; }
      .accent { fill: #c8b89a; }
      .muted { fill: rgba(242,240,235,0.55); }
      .dim { fill: rgba(242,240,235,0.35); }
      .rule { stroke: rgba(255,255,255,0.12); stroke-width: 1; }
      .accent-stroke { stroke: #c8b89a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .num-box { stroke: rgba(255,255,255,0.18); stroke-width: 1; fill: rgba(200,184,154,0.06); }
      .serif { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 300; }
      .serif-i { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 300; font-style: italic; }
      .mono { font-family: 'IBM Plex Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="1000" height="420" class="ink"/>

  <!-- top rule -->
  <line x1="0" y1="56" x2="1000" y2="56" class="rule"/>
  <text x="48" y="36" class="mono paper" font-size="13" letter-spacing="2">APP ARCHITECT</text>
  <text x="952" y="36" class="mono muted" font-size="12" letter-spacing="1" text-anchor="end">5-PHASE DESIGN SYSTEM</text>

  <!-- left: headline -->
  <g>
    <line x1="48" y1="120" x2="76" y2="120" stroke="#c8b89a" stroke-width="1"/>
    <text x="86" y="124" class="mono accent" font-size="11" letter-spacing="2">AI-POWERED DESIGN WORKFLOW</text>

    <text x="48" y="208" class="serif paper" font-size="74" letter-spacing="-1.5">Ship with a</text>
    <text x="48" y="288" class="serif-i accent" font-size="74" letter-spacing="-1.5">plan.</text>

    <text x="48" y="340" class="mono muted" font-size="13">From one-line idea to a production-ready</text>
    <text x="48" y="362" class="mono muted" font-size="13">TDD prompt — in five structured phases.</text>
  </g>

  <!-- vertical divider -->
  <line x1="560" y1="80" x2="560" y2="380" class="rule"/>

  <!-- right: phase list -->
  <g transform="translate(600, 110)">
    <text x="0" y="0" class="mono dim" font-size="10" letter-spacing="2">HOW IT WORKS</text>

    <!-- 01 -->
    <rect x="0" y="22" width="32" height="32" class="num-box"/>
    <text x="16" y="43" class="mono accent" font-size="11" text-anchor="middle">01</text>
    <text x="48" y="36" class="mono paper" font-size="13" font-weight="500">App Flow</text>
    <text x="48" y="52" class="mono muted" font-size="11">User journey · stack · edge cases</text>

    <!-- 02 -->
    <rect x="0" y="74" width="32" height="32" class="num-box"/>
    <text x="16" y="95" class="mono accent" font-size="11" text-anchor="middle">02</text>
    <text x="48" y="88" class="mono paper" font-size="13" font-weight="500">Page Map</text>
    <text x="48" y="104" class="mono muted" font-size="11">Routes · wireframes · interactions</text>

    <!-- 03 -->
    <rect x="0" y="126" width="32" height="32" class="num-box"/>
    <text x="16" y="147" class="mono accent" font-size="11" text-anchor="middle">03</text>
    <text x="48" y="140" class="mono paper" font-size="13" font-weight="500">System Design</text>
    <text x="48" y="156" class="mono muted" font-size="11">DB schema · API routes · architecture</text>

    <!-- 04 -->
    <rect x="0" y="178" width="32" height="32" class="num-box"/>
    <text x="16" y="199" class="mono accent" font-size="11" text-anchor="middle">04</text>
    <text x="48" y="192" class="mono paper" font-size="13" font-weight="500">Executive Summary</text>
    <text x="48" y="208" class="mono muted" font-size="11">Features · risks · open questions</text>

    <!-- 05 -->
    <rect x="0" y="230" width="32" height="32" class="num-box" stroke="#c8b89a" stroke-opacity="0.5"/>
    <text x="16" y="251" class="mono accent" font-size="11" text-anchor="middle">05</text>
    <text x="48" y="244" class="mono accent" font-size="13" font-weight="500">TDD Prompt</text>
    <text x="48" y="260" class="mono muted" font-size="11">Unit · E2E · CI — ready to paste</text>
  </g>
</svg>
